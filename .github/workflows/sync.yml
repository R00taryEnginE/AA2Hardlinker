name: Mirror Sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            scripts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth google-auth-oauthlib boto3 tqdm

      - name: Run Drive sync
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.HARDERLINKER_DRIVE_FOLDER_ID }}
          DRIVE_BASH_SCRIPT_ID: ${{ secrets.DRIVE_BASH_SCRIPT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          python scripts/sync_drive.py

      - name: Publish sync summary
        run: |
          PLAN=drive_cache/.sync_plan.json
          if [ ! -f "$PLAN" ]; then
            echo "Sync plan not found; skipping summary" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### Mirror Sync Report"
            echo
            echo "**Uploads**"
            if jq -e '.upload | length > 0' "$PLAN" >/dev/null; then
              jq -r '.upload[]' "$PLAN" | sed 's/^/- /'
            else
              echo "- None"
            fi
            echo
            echo "**Deletions**"
            if jq -e '.delete | length > 0' "$PLAN" >/dev/null; then
              jq -r '.delete[]' "$PLAN" | sed 's/^/- /'
            else
              echo "- None"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
